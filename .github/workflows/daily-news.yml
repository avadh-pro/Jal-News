# ============================================================================
# Jal News — Multi-Topic News Curator (GitHub Actions)
# ============================================================================
#
# Runs the AI-powered news pipeline every 2 days at 7:00 AM IST.
# Supports multiple channels — each channel is a separate topic/audience.
#
# Schedule: 1:30 AM UTC = 7:00 AM IST (every 2 days)
# Manual:   Can be triggered from the Actions tab → "Run workflow"
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - ANTHROPIC_API_KEY   : Claude AI API key for article scoring
#   - NEWSAPI_KEY         : NewsAPI.org key for additional sources
#   - TELEGRAM_BOT_TOKEN  : Telegram Bot API token for message delivery
#   - TELEGRAM_CHAT_ID    : Default Telegram chat/group ID
# ============================================================================

name: News Curator (Every 2 Days)

on:
  # Scheduled trigger — runs every 2 days at 1:30 AM UTC (7:00 AM IST)
  schedule:
    - cron: '30 1 */2 * *'

  # Manual trigger — allows running from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel slug to run (leave empty for default health channel)'
        required: false
        default: ''

jobs:
  fetch-and-send:
    name: Fetch, Score & Send News Digest
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Cache pip dependencies for faster subsequent runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Run the news curator pipeline
      - name: Run news curator
        run: |
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            python fetch.py --channel "${{ github.event.inputs.channel }}"
          else
            python fetch.py --channel health
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCHEDULE_TIME: "07:00"
          TOP_N_ARTICLES: "5"
