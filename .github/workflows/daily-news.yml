# ============================================================================
# Jal News — Health News Curator (Every 2 Days) (GitHub Actions)
# ============================================================================
#
# Runs the AI-powered health news pipeline every 2 days at 7:00 AM IST.
# Fetches news from 9+ sources, scores with Claude AI, and sends a
# curated digest to Telegram.
#
# Schedule: 1:30 AM UTC = 7:00 AM IST (every 2 days)
# Manual:   Can be triggered from the Actions tab → "Run workflow"
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - ANTHROPIC_API_KEY   : Claude AI API key for article scoring
#   - NEWSAPI_KEY         : NewsAPI.org key for additional sources
#   - TELEGRAM_BOT_TOKEN  : Telegram Bot API token for message delivery
#   - TELEGRAM_CHAT_ID    : Target Telegram chat/group ID
# ============================================================================

name: Health News Curator (Every 2 Days)

on:
  # Scheduled trigger — runs every 2 days at 1:30 AM UTC (7:00 AM IST)
  schedule:
    - cron: '30 1 */2 * *'

  # Manual trigger — allows running from the GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-and-send:
    name: Fetch, Score & Send News Digest
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Cache pip dependencies for faster subsequent runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Run the news curator pipeline
      # Fetches articles → Scores with Claude AI → Sends to Telegram
      - name: Run news curator
        run: python fetch.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCHEDULE_TIME: "07:00"
          TOP_N_ARTICLES: "5"

