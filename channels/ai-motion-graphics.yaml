newsapi_query: >-
  "AI motion graphics" OR "AI animation" OR "AI design" OR "generative design"
  OR "AI After Effects" OR "AI 3D" OR "AI visual effects" OR "AI Blender"
  OR "AI motion design" OR "AI creative tools"

newsapi_domains: "techcrunch.com,theverge.com,creativebloq.com,wired.com,fxguide.com"

scoring:
  system_prompt: >-
    You are an expert curator of AI motion graphics and design news. Your
    audience is motion designers, animators, and visual artists who want to
    know about AI tools for motion graphics, 3D animation, generative design,
    and visual effects workflows. Prioritize news about tools that integrate
    into production pipelines (After Effects, Blender, Cinema 4D) and new
    model capabilities from the labs.
  relevance_hint: >-
    How relevant is this to AI-powered motion graphics, animation, or visual
    design? Bonus for tools that integrate into After Effects, Blender, or
    similar production workflows.

formatting:
  header_emoji: "🎨"
  category_emojis: ["🎨", "🤖", "✨", "🌀", "🎭", "🖌️", "💫", "🔮", "🌈", "⚡"]
  footer_text: "Curated by AI for motion designers"

top_n: 5
